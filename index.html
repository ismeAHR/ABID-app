<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>২০২৬</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <meta name="theme-color" content="#071B12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Naskh+Arabic:wght@600&family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #071B12;
            --primary-color: #0D4A31;
            --accent-color: #1FA36B;
            --card-bg: rgba(255, 255, 255, 0.08);
            --border-color: rgba(255, 255, 255, 0.12);
            --text-color: #FFFFFF;
            --text-dim: rgba(255, 255, 255, 0.6);
            --missed-color: rgba(239, 68, 68, 0.2);
            --missed-border: #EF4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Noto Sans Bengali', 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #splash-logo {
            width: 96px;
            height: 96px;
            opacity: 0;
            transform: scale(0.8);
            animation: splashFadeIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        #splash-text {
            font-family: 'Noto Naskh Arabic', serif;
            font-size: 1.5rem;
            margin-top: 24px;
            opacity: 0;
            animation: splashFadeIn 0.8s ease forwards 0.3s;
        }

        @keyframes splashFadeIn {
            to { opacity: 1; transform: scale(1); }
        }

        /* Main Layout */
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 16px;
            opacity: 0;
            transform: translateY(20px);
            animation: appSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards 1s;
        }

        @keyframes appSlideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 24px;
        }

        .bismillah {
            font-family: 'Noto Naskh Arabic', serif;
            font-size: 1.6rem;
            color: var(--text-color);
            margin-bottom: 8px;
        }

        .main-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-color);
        }

        /* Tab Switcher */
        .tab-container {
            display: flex;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 4px;
            margin-bottom: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .tab-button {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .tab-button.active {
            background: var(--primary-color);
            color: var(--text-color);
            box-shadow: 0 4px 12px rgba(13, 74, 49, 0.3);
        }

        /* Status Cards */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .status-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px 8px;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .status-value {
            font-family: 'Inter', 'Noto Sans Bengali', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* Month Selector */
        .month-scroller {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding-bottom: 12px;
            margin-bottom: 16px;
            scrollbar-width: none;
        }
        .month-scroller::-webkit-scrollbar { display: none; }

        .month-chip {
            flex: 0 0 auto;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-dim);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .month-chip.active {
            background: var(--accent-color);
            color: var(--text-color);
            border-color: var(--accent-color);
        }

        /* Calendar */
        .calendar-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 16px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin-bottom: 24px;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-bottom: 12px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .day-cell {
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.4);
        }

        .day-cell.current-month {
            color: var(--text-color);
        }

        .day-cell.today {
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.2);
            border-color: var(--text-color);
        }

        .day-cell.completed {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: var(--text-color);
            border: none;
            box-shadow: 0 4px 12px rgba(31, 163, 107, 0.4);
        }

        .day-cell.missed {
            background: var(--missed-color);
            color: #EF4444;
            border: 1px solid var(--missed-border);
        }

        .day-cell:active {
            transform: scale(0.9);
        }

        /* Legend */
        .legend {
            display: flex;
            justify-content: center;
            gap: 16px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-dot { width: 100px; height: 10px; border-radius: 4px; display: inline-block; }
        .dot-success { background: var(--accent-color); }
        .dot-missed { background: var(--missed-border); }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img id="splash-logo" src="icon-192.png" alt="Logo">
        <div id="splash-text">بِسْمِ ٱللَّٰهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>
    </div>

    <div class="app-container">
        <header>
            <div class="bismillah">بِسْمِ ٱللَّٰهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>
            <div class="main-title">২০২৬</div>
        </header>

        <div class="tab-container">
            <button class="tab-button active">📅 ক্যালেন্ডার</button>
            <button class="tab-button">💰 টাকা</button>
        </div>

        <div class="status-grid">
            <div class="status-card"><div class="status-value" id="success-count">০</div></div>
            <div class="status-card"><div class="status-value" id="miss-count">০</div></div>
            <div class="status-card"><div class="status-value" id="rate-percent">০%</div></div>
        </div>

        <div class="month-scroller" id="month-list"></div>

        <div class="calendar-container">
            <div class="weekdays">
                <div>রবি</div><div>সোম</div><div>মঙ্গল</div><div>বুধ</div><div>বৃহ</div><div>শুক্র</div><div>শনি</div>
            </div>
            <div class="days-grid" id="calendar-days"></div>
        </div>

        <div class="legend">
            <div class="legend-item"><span class="legend-dot dot-success"></span> লক্ষ্য পূরণ</div>
            <div class="legend-item"><span class="legend-dot dot-missed"></span> মিস হয়েছে</div>
        </div>
    </div>

    <script>
        // Splash Screen Handler
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => splash.remove(), 500);
            }, 1500);
        });

        // App State & Logic
        const monthsBN = ["জানুয়ারি", "ফেব্রুয়ারি", "মার্চ", "এপ্রিল", "মে", "জুন", "জুলাই", "আগস্ট", "সেপ্টেম্বর", "অক্টোবর", "নভেম্বর", "ডিসেম্বর"];
        const digitsBN = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];
        
        function toBanglaNum(num) {
            return num.toString().split('').map(d => digitsBN[d] || d).join('');
        }

        let currentMonth = new Date().getMonth();
        let appData = JSON.parse(localStorage.getItem('ahr_data_2026')) || {};

        function renderMonths() {
            const container = document.getElementById('month-list');
            container.innerHTML = '';
            monthsBN.forEach((m, idx) => {
                const chip = document.createElement('div');
                chip.className = `month-chip ${idx === currentMonth ? 'active' : ''}`;
                chip.innerText = m;
                chip.onclick = () => {
                    currentMonth = idx;
                    renderMonths();
                    renderCalendar();
                };
                container.appendChild(chip);
            });
        }

        function updateStats() {
            let success = 0, missed = 0;
            const daysInMonth = new Date(2026, currentMonth + 1, 0).getDate();
            
            for(let d = 1; d <= daysInMonth; d++) {
                const key = `2026-${currentMonth}-${d}`;
                if(appData[key] === 'success') success++;
                if(appData[key] === 'missed') missed++;
            }

            const total = success + missed;
            const rate = total > 0 ? Math.round((success / total) * 100) : 0;

            // Simple Number Counting Animation
            document.getElementById('success-count').innerText = toBanglaNum(success);
            document.getElementById('miss-count').innerText = toBanglaNum(missed);
            document.getElementById('rate-percent').innerText = toBanglaNum(rate) + '%';
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-days');
            grid.innerHTML = '';
            
            const firstDay = new Date(2026, currentMonth, 1).getDay();
            const daysInMonth = new Date(2026, currentMonth + 1, 0).getDate();
            const today = new Date();

            // Prev Month Empty Cells
            for(let i = 0; i < firstDay; i++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                grid.appendChild(cell);
            }

            // Current Month Cells
            for(let d = 1; d <= daysInMonth; d++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell current-month';
                cell.innerText = toBanglaNum(d);
                
                const key = `2026-${currentMonth}-${d}`;
                if(appData[key]) cell.classList.add(appData[key]);
                
                if(today.getFullYear() === 2026 && today.getMonth() === currentMonth && today.getDate() === d) {
                    cell.classList.add('today');
                }

                // Interaction Logic
                cell.onclick = () => {
                    if(cell.classList.contains('completed')) {
                        cell.classList.remove('completed');
                        cell.classList.add('missed');
                        appData[key] = 'missed';
                    } else if(cell.classList.contains('missed')) {
                        cell.classList.remove('missed');
                        delete appData[key];
                    } else {
                        cell.classList.add('completed');
                        appData[key] = 'success';
                    }
                    localStorage.setItem('ahr_data_2026', JSON.stringify(appData));
                    updateStats();
                };

                grid.appendChild(cell);
            }
            updateStats();
        }

        // Init
        renderMonths();
        renderCalendar();

        // PWA SW Register
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
