<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>২০২৬</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#071B12" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Naskh+Arabic:wght@600&family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #071B12;
      --primary-color: #0D4A31;
      --accent-color: #1FA36B;
      --card-bg: rgba(255, 255, 255, 0.08);
      --border-color: rgba(255, 255, 255, 0.12);
      --text-color: #FFFFFF;
      --text-dim: rgba(255, 255, 255, 0.6);
      --success-glow: rgba(31, 163, 107, 0.4);
      --missed-color: rgba(239, 68, 68, 0.2);
      --missed-border: #EF4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: 'Noto Sans Bengali', system-ui, sans-serif; }
    body { background: var(--bg-color); color: var(--text-color); min-height: 100vh;
      padding: max(20px, env(safe-area-inset-top)) 16px calc(30px + env(safe-area-inset-bottom));
      overflow-x: hidden; }

    /* Splash Screen */
    #splash-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg-color); z-index: 9999;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #splash-logo { width: 96px; height: 96px; opacity: 0; transform: scale(0.8); animation: splashFadeIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    #splash-text { font-family: 'Noto Naskh Arabic', serif; font-size: 1.6rem; margin-top: 24px; opacity: 0; animation: splashFadeIn 0.8s ease forwards 0.3s; color: #fff; }
    @keyframes splashFadeIn { to { opacity: 1; transform: scale(1); } }

    /* App Layout */
    .app-container { max-width: 480px; margin: 0 auto; opacity: 0; transform: translateY(20px); animation: appSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards 1s; }
    @keyframes appSlideUp { to { opacity: 1; transform: translateY(0); } }

    header { text-align: center; margin-bottom: 24px; }
    .bismillah { font-family: 'Noto Naskh Arabic', serif; font-size: 1.8rem; margin-bottom: 8px; text-align: center; }
    .main-title { font-size: 2rem; font-weight: 700; font-family: 'Inter', 'Noto Sans Bengali', sans-serif; }

    /* Tabs */
    .nav-tabs { display: flex; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 4px; margin-bottom: 20px; backdrop-filter: blur(20px); }
    .nav-tab { flex: 1; background: transparent; border: none; color: var(--text-dim); padding: 12px; font-size: 1rem; font-weight: 600; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; text-align: center; }
    .nav-tab.active { background: var(--primary-color); color: var(--text-color); box-shadow: 0 4px 12px rgba(13, 74, 49, 0.3); }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 18px 8px; text-align: center; backdrop-filter: blur(20px); box-shadow: 0 8px 32px rgba(0,0,0,0.2); position: relative; overflow: hidden; }
    .stat-value { font-family: 'Inter', 'Noto Sans Bengali', sans-serif; font-size: 1.6rem; font-weight: 700; transition: all 0.3s ease; }

    /* Month Selector */
    .month-scroll { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 12px; margin-bottom: 16px; scrollbar-width: none; }
    .month-scroll::-webkit-scrollbar { display: none; }
    .month-btn { flex: 0 0 auto; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-dim); padding: 8px 16px; border-radius: 20px; font-size: 0.9rem; cursor: pointer; transition: all 0.2s ease; }
    .month-btn.active { background: var(--accent-color); color: var(--text-color); border-color: var(--accent-color); }

    /* Habit Cards / Layout */
    .section-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 24px; padding: 16px; backdrop-filter: blur(20px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); margin-bottom: 20px; }
    .section-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 14px; color: var(--text-color); display: flex; align-items: center; gap: 6px; }

    /* Calendar View */
    .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; color: var(--text-dim); font-size: 0.85rem; margin-bottom: 12px; }
    .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .day-cell { aspect-ratio: 1; display: flex; justify-content: center; align-items: center; font-family: 'Inter', 'Noto Sans Bengali', sans-serif; font-size: 1rem; font-weight: 600; border-radius: 12px; cursor: pointer; position: relative; transition: all 0.2s ease; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.03); color: rgba(255,255,255,0.2); }
    .day-cell.current-month { color: var(--text-color); }
    .day-cell.today { border: 1px solid #fff; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
    .day-cell.completed { background: linear-gradient(135deg, var(--primary-color), var(--accent-color)); color: #fff; border: none; box-shadow: 0 4px 12px var(--success-glow); }
    .day-cell.missed { background: var(--missed-color); color: #EF4444; border: 1px solid var(--missed-border); }
    .day-cell:active { transform: scale(0.9); }

    /* Habit List View */
    .habit-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 14px; margin-bottom: 8px; }
    .habit-info { display: flex; flex-direction: column; }
    .habit-name { font-size: 1rem; font-weight: 600; }
    .habit-streak { font-size: 0.8rem; color: var(--text-dim); }
    .habit-actions { display: flex; gap: 8px; }
    .action-btn { border: none; padding: 6px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.15s ease; color: #fff; }
    .action-btn.done { background: var(--primary-color); }
    .action-btn.miss { background: rgba(239, 68, 68, 0.2); color: #EF4444; border: 1px solid #EF4444; }

    /* Money Section View */
    .money-overview { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .money-stat { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 14px; padding: 12px; text-align: center; }
    .money-stat-lbl { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 4px; }
    .money-stat-val { font-size: 1.25rem; font-weight: 700; font-family: 'Inter', sans-serif; }
    .money-stat-val.income { color: #1FA36B; }
    .money-stat-val.expense { color: #EF4444; }

    .money-btn-group { display: flex; gap: 12px; margin-bottom: 16px; }
    .money-act-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; color:#fff; transition: all 0.2s ease; font-size: 0.95rem; }
    .money-act-btn.inc { background: var(--primary-color); }
    .money-act-btn.exp { background: rgba(239,68,68,0.2); color: #EF4444; border: 1px solid #EF4444; }
    
    .log-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.02); border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 8px; }
    .log-details { display: flex; flex-direction: column; gap: 2px; }
    .log-note { font-size: 0.95rem; font-weight: 600; }
    .log-date { font-size: 0.75rem; color: var(--text-dim); }
    .log-amt { font-weight: 700; font-family: 'Inter', sans-serif; }
    .log-amt.income { color: #1FA36B; }
    .log-amt.expense { color: #EF4444; }

    /* Modal Overlay Box */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 1000; transition: opacity 0.3s ease; }
    .modal-box { background: #0c251a; border: 1px solid var(--border-color); border-radius: 24px; padding: 20px; width: 90%; max-width: 360px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); animation: zoomIn 0.25s ease; }
    @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal-box h3 { margin-bottom: 12px; font-size: 1.15rem; }
    .modal-box input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: 10px; color: #fff; margin-bottom: 12px; font-size: 1rem; outline: none; }
    .modal-box input:focus { border-color: var(--accent-color); }
    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
    .modal-btn { padding: 8px 16px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; }
    .modal-btn.cancel { background: transparent; color: var(--text-dim); }
    .modal-btn.save { background: var(--accent-color); color: #fff; }

    .hidden { display: none !important; }
    .legend { display: flex; justify-content: center; gap: 16px; font-size: 0.85rem; color: var(--text-dim); margin-top: 12px; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
    .dot-success { background: var(--accent-color); }
    .dot-missed { background: #EF4444; }
  </style>
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash-screen">
    <img id="splash-logo" src="icon-192.png" alt="Logo" onerror="this.style.display='none'">
    <div id="splash-text">بِسْمِ ٱللَّٰهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>
  </div>

  <!-- App Wrapper -->
  <div class="app-container">
    <header>
      <div class="bismillah">بِسْمِ ٱللَّٰهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>
      <div class="main-title">২০২৬</div>
    </header>

    <div class="nav-tabs">
      <button class="nav-tab active" id="tab-cal-btn" onclick="switchTab('cal')">📅 ক্যালেন্ডার</button>
      <button class="nav-tab" id="tab-money-btn" onclick="switchTab('money')">💰 টাকা</button>
    </div>

    <!-- Status Cards -->
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value" id="stat-ok">০</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-miss">০</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-pct">০%</div></div>
    </div>

    <!-- Month Scroll Bar -->
    <div class="month-scroll" id="month-bar"></div>

    <!-- View Content Area -->
    <div id="view-cal">
      <div class="section-card">
        <div class="weekdays">
          <div>রবি</div><div>সোમ</div><div>মঙ্গল</div><div>বুধ</div><div>বৃহ</div><div>শুক্র</div><div>শনি</div>
        </div>
        <div class="days-grid" id="calendar-days"></div>
        <div class="legend">
          <div class="legend-item"><span class="legend-dot dot-success"></span> লক্ষ্য পূরণ</div>
          <div class="legend-item"><span class="legend-dot dot-missed"></span> মিস হয়েছে</div>
        </div>
      </div>
    </div>

    <div id="view-money" class="hidden">
      <div class="section-card">
        <div class="money-overview">
          <div class="money-stat">
            <div class="money-stat-lbl">মোট আয়</div>
            <div class="money-stat-val income" id="total-income">৳০</div>
          </div>
          <div class="money-stat">
            <div class="money-stat-lbl">মোট খরচ</div>
            <div class="money-stat-val expense" id="total-expense">৳০</div>
          </div>
        </div>
        <div class="money-btn-group">
          <button class="money-act-btn inc" onclick="openMoneyModal('income')">➕ আয় যোগ করুন</button>
          <button class="money-act-btn exp" onclick="openMoneyModal('expense')">➖ খরচ যোগ করুন</button>
        </div>
        <div class="section-title">📊 লেনদেন ইতিহাস</div>
        <div id="money-logs"></div>
      </div>
    </div>
  </div>

  <!-- Finance Input Modal Box -->
  <div class="modal-overlay hidden" id="money-modal">
    <div class="modal-box">
      <h3 id="modal-title">হিসাব যোগ করুন</h3>
      <input type="number" id="modal-amount" placeholder="টাকার পরিমাণ (৳)" />
      <input type="text" id="modal-note" placeholder="ছোট নোট/বিবরণ" />
      <div class="modal-btns">
        <button class="modal-btn cancel" onclick="closeMoneyModal()">বাতিল</button>
        <button class="modal-btn save" onclick="saveMoneyItem()">সংরক্ষণ</button>
      </div>
    </div>
  </div>

  <script>
    // Remove Splash screen
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        if(splash) {
          splash.style.opacity = '0';
          setTimeout(() => splash.remove(), 500);
        }
      }, 1500);
    });

    const monthsBN = ["জানুয়ারি", "ফেব্রুয়ারি", "মার্চ", "এপ্রিল", "মে", "জুন", "জুলাই", "আগস্ট", "সেপ্টেম্বর", "অক্টোবর", "নভেম্বর", "ডিসেম্বর"];
    const digitsBN = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];
    
    function toBN(num) {
      return num.toString().split('').map(d => digitsBN[d] || d).join('');
    }

    let activeTab = 'cal';
    let currentMonth = new Date().getMonth();
    let appData = JSON.parse(localStorage.getItem('ahr_cal_2026')) || {};
    let moneyData = JSON.parse(localStorage.getItem('ahr_money_2026')) || [];
    let modalType = 'income';

    function switchTab(tab) {
      activeTab = tab;
      document.getElementById('tab-cal-btn').classList.toggle('active', tab === 'cal');
      document.getElementById('tab-money-btn').classList.toggle('active', tab === 'money');
      document.getElementById('view-cal').classList.toggle('hidden', tab !== 'cal');
      document.getElementById('view-money').classList.toggle('hidden', tab !== 'money');
    }

    function renderMonthBar() {
      const container = document.getElementById('month-bar');
      container.innerHTML = '';
      monthsBN.forEach((m, idx) => {
        const btn = document.createElement('button');
        btn.className = `month-btn ${idx === currentMonth ? 'active' : ''}`;
        btn.innerText = m;
        btn.onclick = () => {
          currentMonth = idx;
          renderMonthBar();
          renderCalendar();
        };
        container.appendChild(btn);
      });
    }

    function updateHabitStats() {
      let success = 0, missed = 0;
      const daysCount = new Date(2026, currentMonth + 1, 0).getDate();
      for (let d = 1; d <= daysCount; d++) {
        const key = `2026-${currentMonth}-${d}`;
        if (appData[key] === 'completed') success++;
        if (appData[key] === 'missed') missed++;
      }
      const total = success + missed;
      const pct = total > 0 ? Math.round((success / total) * 100) : 0;

      document.getElementById('stat-ok').innerText = toBN(success);
      document.getElementById('stat-miss').innerText = toBN(missed);
      document.getElementById('stat-pct').innerText = toBN(pct) + '%';
    }

    function renderCalendar() {
      const grid = document.getElementById('calendar-days');
      grid.innerHTML = '';
      
      const firstDay = new Date(2026, currentMonth, 1).getDay();
      const daysCount = new Date(2026, currentMonth + 1, 0).getDate();
      const today = new Date();

      for (let i = 0; i < firstDay; i++) {
        const cell = document.createElement('div');
        cell.className = 'day-cell';
        grid.appendChild(cell);
      }

      for (let d = 1; d <= daysCount; d++) {
        const cell = document.createElement('div');
        cell.className = 'day-cell current-month';
        cell.innerText = toBN(d);
        
        const key = `2026-${currentMonth}-${d}`;
        if (appData[key]) cell.classList.add(appData[key]);
        
        if (today.getFullYear() === 2026 && today.getMonth() === currentMonth && today.getDate() === d) {
          cell.classList.add('today');
        }

        cell.onclick = () => {
          if (cell.classList.contains('completed')) {
            cell.classList.remove('completed');
            cell.classList.add('missed');
            appData[key] = 'missed';
          } else if (cell.classList.contains('missed')) {
            cell.classList.remove('missed');
            delete appData[key];
          } else {
            cell.classList.add('completed');
            appData[key] = 'completed';
          }
          localStorage.setItem('ahr_cal_2026', JSON.stringify(appData));
          updateHabitStats();
        };
        grid.appendChild(cell);
      }
      updateHabitStats();
    }

    // Money Management Logic
    function openMoneyModal(type) {
      modalType = type;
      document.getElementById('modal-title').innerText = type === 'income' ? '➕ আয় যোগ করুন' : '➖ খরচ যোগ করুন';
      document.getElementById('modal-amount').value = '';
      document.getElementById('modal-note').value = '';
      document.getElementById('money-modal').classList.remove('hidden');
    }

    function closeMoneyModal() {
      document.getElementById('money-modal').classList.add('hidden');
    }

    function saveMoneyItem() {
      const amt = parseFloat(document.getElementById('modal-amount').value);
      const note = document.getElementById('modal-note').value.trim() || (modalType === 'income' ? 'আয়' : 'খরচ');
      if (!amt || amt <= 0) return;

      const item = {
        id: Date.now(),
        type: modalType,
        amount: amt,
        note: note,
        date: new Date().toLocaleDateString('bn-BD', { month: 'long', day: 'numeric' })
      };

      moneyData.unshift(item);
      localStorage.setItem('ahr_money_2026', JSON.stringify(moneyData));
      closeMoneyModal();
      renderMoneySection();
    }

    function renderMoneySection() {
      let totalInc = 0, totalExp = 0;
      const logsContainer = document.getElementById('money-logs');
      logsContainer.innerHTML = '';

      moneyData.forEach(item => {
        if (item.type === 'income') totalInc += item.amount;
        else totalExp += item.amount;

        const row = document.createElement('div');
        row.className = 'log-item';
        row.innerHTML = `
          <div class="log-details">
            <span class="log-note">${item.note}</span>
            <span class="log-date">${item.date}</span>
          </div>
          <span class="log-amt ${item.type}"> ${item.type === 'income' ? '+' : '-'} ৳${toBN(item.amount)}</span>
        `;
        logsContainer.appendChild(row);
      });

      document.getElementById('total-income').innerText = '৳' + toBN(totalInc);
      document.getElementById('total-expense').innerText = '৳' + toBN(totalExp);
    }

    // Initialize Components
    renderMonthBar();
    renderCalendar();
    renderMoneySection();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    }
  </script>
</body>
</html>
